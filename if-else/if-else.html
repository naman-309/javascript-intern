<!DOCTYPE html>
<html>

<head>
    <title>If Else Practice</title>
</head>

<body>

    <h2>JS If Else Example</h2>

    <script>

        let age = 10;

        if (age >= 18) {
            console.log("You can vote");
        } else {
            console.log("You cannot vote");
        }

    </script>

</body>

</html>
